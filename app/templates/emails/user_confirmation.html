<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ subject }}</title>
</head>
<body style="margin:0; padding:0; background:#f6f7f9; color:#1f2937; font-family:Arial, sans-serif;">
  <div style="max-width:620px; margin:0 auto; padding:24px;">
    <div style="background:#ffffff; border:1px solid #e5e7eb; border-radius:8px; padding:24px;">
      <h1 style="margin:0 0 16px; font-size:22px; line-height:1.3;">{{ name }}, ваше обращение получено</h1>
      <div style="white-space:pre-wrap; line-height:1.5;">{{ user_reply }}</div>
      <p style="margin:20px 0 0; color:#6b7280;">Спасибо за сообщение.</p>
    </div>
  </div>
</body>
</html>
